<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Chat Widget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    /* ─── Only layout styles needed for fixed positioning ─── */
    #chat-launcher {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1050;
    }
    #chat-window {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 360px;
      max-height: 520px;
      z-index: 1049;
      display: none;
      flex-direction: column;
    }
    #chat-messages {
      height: 300px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    .bubble-user {
      max-width: 80%;
    }
    .bubble-bot {
      max-width: 80%;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
  </style>
</head>
<body class="bg-transparent">

  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║              PORTFOLIO AI CHAT WIDGET                           ║
  ║                                                                  ║
  ║  HOW TO ADD THIS TO ANY PAGE IN YOUR PORTFOLIO:                 ║
  ║                                                                  ║
  ║  Option A – Embed as iframe (easiest):                          ║
  ║    Paste this just before </body> on any page:                  ║
  ║    <iframe src="chat.html"                                       ║
  ║            style="position:fixed;bottom:0;right:0;             ║
  ║                   width:420px;height:600px;                     ║
  ║                   border:none;z-index:9999;">                   ║
  ║    </iframe>                                                     ║
  ║                                                                  ║
  ║  Option B – Copy the <script> block at the bottom of this      ║
  ║  file and paste it (along with the #chat-launcher and           ║
  ║  #chat-window divs) directly into any HTML page.               ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->

  <!-- ── Floating Launch Button ── -->
  <div id="chat-launcher">
    <button class="btn btn-primary btn-lg rounded-circle shadow-lg"
            id="btnToggleChat"
            title="Chat with my Portfolio AI"
            style="width:60px;height:60px;">
      <i class="bi bi-chat-dots-fill fs-4" id="chatIcon"></i>
    </button>
  </div>

  <!-- ── Chat Window ── -->
  <div id="chat-window" class="card shadow-lg border-0 rounded-3">

    <!-- Header -->
    <div class="card-header bg-primary text-white d-flex align-items-center justify-content-between rounded-top-3 py-2">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-robot fs-5"></i>
        <div>
          <div class="fw-bold lh-1" style="font-size:.9rem;">Portfolio Assistant</div>
          <div class="text-white-50" style="font-size:.72rem;">Powered by Claude AI</div>
        </div>
      </div>
      <button class="btn btn-sm btn-close btn-close-white" id="btnCloseChat"></button>
    </div>

    <!-- API Key Setup Panel (shown until key is saved) -->
    <div id="setup-panel" class="card-body p-3 border-bottom">
      <p class="text-muted mb-2" style="font-size:.8rem;">
        <i class="bi bi-key-fill me-1 text-warning"></i>
        Enter your <strong>Anthropic API key</strong> to activate the assistant.
        Your key is only stored in this browser tab and never sent anywhere except directly to Anthropic.
      </p>
      <div class="input-group input-group-sm">
        <input type="password" class="form-control" id="apiKeyInput"
               placeholder="sk-ant-..." autocomplete="off" />
        <button class="btn btn-primary" id="btnSaveKey">
          <i class="bi bi-check-lg"></i>
        </button>
      </div>
      <div id="keyError" class="text-danger mt-1" style="font-size:.75rem; display:none;">
        Please enter a valid API key (starts with sk-ant-)
      </div>
    </div>

    <!-- Messages Area -->
    <div class="card-body p-3 bg-light flex-grow-1" id="chat-messages">
      <!-- Messages injected here by JS -->
    </div>

    <!-- Suggested Questions (shown at start) -->
    <div id="suggestions" class="px-3 pb-2 bg-light border-top">
      <p class="text-muted mb-1 mt-2" style="font-size:.75rem;">Try asking:</p>
      <div class="d-flex flex-wrap gap-1">
        <button class="btn btn-outline-secondary btn-sm suggestion-btn" style="font-size:.72rem;">What skills do you have?</button>
        <button class="btn btn-outline-secondary btn-sm suggestion-btn" style="font-size:.72rem;">Tell me about your projects</button>
        <button class="btn btn-outline-secondary btn-sm suggestion-btn" style="font-size:.72rem;">What are your achievements?</button>
        <button class="btn btn-outline-secondary btn-sm suggestion-btn" style="font-size:.72rem;">How can I contact you?</button>
      </div>
    </div>

    <!-- Input Bar -->
    <div class="card-footer bg-white border-top p-2">
      <div class="input-group">
        <input type="text" class="form-control form-control-sm" id="userInput"
               placeholder="Ask about my portfolio..." disabled />
        <button class="btn btn-primary btn-sm" id="btnSend" disabled>
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
      <div class="text-muted text-end mt-1" style="font-size:.65rem;">
        Press Enter to send &bull; <span id="clearBtn" class="text-primary" style="cursor:pointer;">Clear chat</span>
      </div>
    </div>

  </div><!-- /chat-window -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  // ─────────────────────────────────────────────
  //  PORTFOLIO AI CHAT  –  IS436 System Analysis
  //  Model: claude-haiku-4-5-20251001 (fast + low cost)
  // ─────────────────────────────────────────────

  const CLAUDE_API   = "https://api.anthropic.com/v1/messages";
  const CLAUDE_MODEL = "claude-haiku-4-5-20251001";
  const DATA_FILE    = "data.json";

  let portfolioData = null;   // loaded from data.json
  let apiKey        = "";
  let messages      = [];     // conversation history sent to Claude

  // ── DOM refs ──
  const chatWindow    = document.getElementById("chat-window");
  const chatMessages  = document.getElementById("chat-messages");
  const userInput     = document.getElementById("userInput");
  const btnSend       = document.getElementById("btnSend");
  const btnToggle     = document.getElementById("btnToggleChat");
  const btnClose      = document.getElementById("btnCloseChat");
  const apiKeyInput   = document.getElementById("apiKeyInput");
  const btnSaveKey    = document.getElementById("btnSaveKey");
  const setupPanel    = document.getElementById("setup-panel");
  const keyError      = document.getElementById("keyError");
  const suggestions   = document.getElementById("suggestions");
  const chatIcon      = document.getElementById("chatIcon");
  const clearBtn      = document.getElementById("clearBtn");

  // ── Load portfolio data from data.json ──
  async function loadPortfolioData() {
    try {
      const res = await fetch(DATA_FILE);
      if (!res.ok) throw new Error("data.json not found");
      portfolioData = await res.json();
    } catch (e) {
      portfolioData = { error: "Could not load portfolio data." };
    }
  }

  // ── Build system prompt from JSON data ──
  function buildSystemPrompt() {
    const d = portfolioData;
    return `You are a friendly AI assistant embedded in ${d.student?.name || "a student"}'s personal portfolio website.
Your job is to answer visitor questions about this student's background, skills, projects, and achievements.
Always be professional, encouraging, and concise. Limit each reply to 3-5 sentences unless more detail is clearly needed.
Only answer questions related to this portfolio. If asked something unrelated, politely redirect the conversation.

Here is the student's complete portfolio data in JSON format:
${JSON.stringify(d, null, 2)}

Key facts to highlight when relevant:
- Student: ${d.student?.name}, studying ${d.student?.major} at ${d.student?.university}
- Course: ${d.student?.course}
- Skills: ${d.skills?.join(", ")}
- Number of projects: ${d.projects?.length}
- Number of achievements: ${d.achievements?.length}
- Contact email: ${d.student?.email}`;
  }

  // ── Toggle chat window open/close ──
  btnToggle.addEventListener("click", () => {
    const isOpen = chatWindow.style.display === "flex";
    chatWindow.style.display = isOpen ? "none" : "flex";
    chatIcon.className = isOpen ? "bi bi-chat-dots-fill fs-4" : "bi bi-x-lg fs-4";
    if (!isOpen && messages.length === 0) addWelcomeMessage();
  });

  btnClose.addEventListener("click", () => {
    chatWindow.style.display = "none";
    chatIcon.className = "bi bi-chat-dots-fill fs-4";
  });

  // ── Save API key ──
  btnSaveKey.addEventListener("click", saveKey);
  apiKeyInput.addEventListener("keydown", e => { if (e.key === "Enter") saveKey(); });

  function saveKey() {
    const val = apiKeyInput.value.trim();
    if (!val.startsWith("sk-ant-") && !val.startsWith("sk-")) {
      keyError.style.display = "block";
      return;
    }
    apiKey = val;
    keyError.style.display = "none";
    setupPanel.style.display = "none";
    userInput.disabled = false;
    btnSend.disabled = false;
    userInput.focus();
    addWelcomeMessage();
  }

  // ── Welcome message ──
  function addWelcomeMessage() {
    if (chatMessages.children.length > 0) return;
    const name = portfolioData?.student?.name || "this student";
    addBotMessage(`Hi! I'm the AI assistant for **${name}'s** portfolio. Ask me anything about their skills, projects, or achievements!`);
  }

  // ── Suggestion buttons ──
  document.querySelectorAll(".suggestion-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (!apiKey) return;
      userInput.value = btn.textContent;
      sendMessage();
      suggestions.style.display = "none";
    });
  });

  // ── Send on Enter ──
  userInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  btnSend.addEventListener("click", sendMessage);

  // ── Clear chat ──
  clearBtn.addEventListener("click", () => {
    messages = [];
    chatMessages.innerHTML = "";
    suggestions.style.display = "block";
    addWelcomeMessage();
  });

  // ── Main send function ──
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || !apiKey) return;

    userInput.value = "";
    suggestions.style.display = "none";
    addUserMessage(text);
    messages.push({ role: "user", content: text });

    const typingId = addTypingIndicator();

    try {
      const response = await fetch(CLAUDE_API, {
        method: "POST",
        headers: {
          "Content-Type":         "application/json",
          "x-api-key":            apiKey,
          "anthropic-version":    "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model:      CLAUDE_MODEL,
          max_tokens: 512,
          system:     buildSystemPrompt(),
          messages:   messages
        })
      });

      removeTypingIndicator(typingId);

      if (!response.ok) {
        const err = await response.json();
        const msg = err?.error?.message || "API error. Check your key and try again.";
        addBotMessage(`Sorry, I hit an error: *${msg}*`);
        messages.pop();
        return;
      }

      const data = await response.json();
      const reply = data.content?.[0]?.text || "I couldn't generate a response.";
      messages.push({ role: "assistant", content: reply });
      addBotMessage(reply);

    } catch (e) {
      removeTypingIndicator(typingId);
      addBotMessage("Network error. Make sure you're running this from a server (not file://) and your API key is correct.");
      messages.pop();
    }
  }

  // ── Render helpers ──

  function addUserMessage(text) {
    const div = document.createElement("div");
    div.className = "d-flex justify-content-end mb-2";
    div.innerHTML = `
      <div class="bubble-user bg-primary text-white rounded-3 px-3 py-2 shadow-sm" style="font-size:.85rem;">
        ${escapeHtml(text)}
      </div>`;
    chatMessages.appendChild(div);
    scrollBottom();
  }

  function addBotMessage(text) {
    const div = document.createElement("div");
    div.className = "d-flex justify-content-start mb-2";
    div.innerHTML = `
      <div class="bubble-bot bg-white border rounded-3 px-3 py-2 shadow-sm" style="font-size:.85rem;">
        <i class="bi bi-robot text-primary me-1" style="font-size:.7rem;"></i>
        ${simpleMarkdown(text)}
      </div>`;
    chatMessages.appendChild(div);
    scrollBottom();
  }

  function addTypingIndicator() {
    const id = "typing-" + Date.now();
    const div = document.createElement("div");
    div.id = id;
    div.className = "d-flex justify-content-start mb-2";
    div.innerHTML = `
      <div class="bubble-bot bg-white border rounded-3 px-3 py-2 shadow-sm d-flex align-items-center gap-1">
        <div class="typing-dot bg-secondary"></div>
        <div class="typing-dot bg-secondary"></div>
        <div class="typing-dot bg-secondary"></div>
      </div>`;
    chatMessages.appendChild(div);
    scrollBottom();
    return id;
  }

  function removeTypingIndicator(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // Very simple markdown: **bold**, *italic*, bullet lists
  function simpleMarkdown(text) {
    return escapeHtml(text)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g,     "<em>$1</em>")
      .replace(/\n- /g,          "<br>&bull; ")
      .replace(/\n/g,            "<br>");
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Init: load JSON data on page load ──
  loadPortfolioData();
  </script>

</body>
</html>
